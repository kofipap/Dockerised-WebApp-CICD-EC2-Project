version: '3.9'

services:

  backend:
    build: .
    container_name: kofis-pen-backend

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    environment:
      - MONGO_URI=mongodb://mongodb:27017/kofispen

  mongodb:
    image: mongo:7

    container_name: kofis-pen-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: