<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 class="page-title">Our Premium Pens</h1>

<div class="products-container">

  <div class="product-card">
    <img src="images/pen1.jpg" alt="Pen">
    <h2>Executive Gold Pen</h2>
    <p>$25</p>
    <button onclick="addToCart('Executive Gold Pen',25)">
      Add To Cart
    </button>
  </div>

  <div class="product-card">
    <img src="images/pen2.jpg" alt="Pen">
    <h2>Classic Black Pen</h2>
    <p>$15</p>
    <button onclick="addToCart('Classic Black Pen',15)">
      Add To Cart
    </button>
  </div>

  <div class="product-card">
    <img src="images/pen3.jpg" alt="Pen">
    <h2>Luxury Silver Pen</h2>
    <p>$30</p>
    <button onclick="addToCart('Luxury Silver Pen',30)">
      Add To Cart
    </button>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
